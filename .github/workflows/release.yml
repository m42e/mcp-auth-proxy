name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.2.3)"
        required: true
        type: string

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: mcp-auth-proxy
            archive: tar.gz
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            binary: mcp-auth-proxy.exe
            archive: zip
          - runner: macos-14
            target: x86_64-apple-darwin
            binary: mcp-auth-proxy
            archive: tar.gz
          - runner: macos-14
            target: aarch64-apple-darwin
            binary: mcp-auth-proxy
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Verify tag matches crate version
        shell: bash
        run: |
          CRATE_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          TAG_VERSION="${RELEASE_TAG#v}"
          if [ "$CRATE_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Crate version ($CRATE_VERSION) does not match tag version ($TAG_VERSION)"
            exit 1
          fi

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          ARCHIVE_NAME="mcp-auth-proxy-${RELEASE_TAG}-${{ matrix.target }}.tar.gz"
          tar -czf "$ARCHIVE_NAME" -C "target/${{ matrix.target }}/release" "${{ matrix.binary }}"
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $archiveName = "mcp-auth-proxy-${{ env.RELEASE_TAG }}-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.binary }}" -DestinationPath $archiveName
          echo "ARCHIVE_NAME=$archiveName" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcp-auth-proxy-${{ matrix.target }}
          path: ${{ env.ARCHIVE_NAME }}

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate release notes
        run: |
          git-cliff --config .github/cliff.toml --current -o RELEASE_BODY.md

      - name: Create or update GitHub release
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --notes-file RELEASE_BODY.md
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --notes-file RELEASE_BODY.md \
              dist/*
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
