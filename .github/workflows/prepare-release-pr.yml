name: Prepare Release PR

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (without leading v), e.g. 1.2.3"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    name: Prepare release PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version must be in semver format (X.Y.Z)"
            exit 1
          fi

      - name: Check tag does not already exist
        run: |
          if git rev-parse "v${{ inputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag v${{ inputs.version }} already exists"
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Update Cargo.toml version
        run: |
          sed -i 's/^version = ".*"/version = "${{ inputs.version }}"/' Cargo.toml

      - name: Update Cargo.lock
        run: cargo update -w

      - name: Generate release notes
        run: |
          mkdir -p release-notes
          git-cliff --config .github/cliff.toml --unreleased --tag "v${{ inputs.version }}" -o "release-notes/v${{ inputs.version }}.md"

      - name: Upload release notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes/v${{ inputs.version }}.md

      - name: Create release branch and open PR
        run: |
          BRANCH="release/v${{ inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore: prepare release v${{ inputs.version }}"
          git push origin "$BRANCH"
          gh pr create \
            --title "Release v${{ inputs.version }}" \
            --body "Automated release preparation for **v${{ inputs.version }}**.

          This PR contains:
          - Version bump in \`Cargo.toml\` and \`Cargo.lock\`
          - Generated release notes in \`release-notes/v${{ inputs.version }}.md\`

          Review and merge to create the release tag automatically." \
            --base main \
            --head "$BRANCH" \
            --label release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
