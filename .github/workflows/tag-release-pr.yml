name: Tag Release PR

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  actions: write

jobs:
  tag:
    name: Tag merged release PR
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      startsWith(github.event.pull_request.head.ref, 'release/v') &&
      contains(github.event.pull_request.labels.*.name, 'release')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Read version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Verify branch name matches version
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          EXPECTED="release/v${{ steps.version.outputs.version }}"
          if [ "$BRANCH" != "$EXPECTED" ]; then
            echo "::error::Branch name '$BRANCH' does not match expected '$EXPECTED'"
            exit 1
          fi

      - name: Verify tag does not exist
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists"
            exit 1
          fi

      - name: Create and push tag
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Dispatch release workflow
        run: |
          gh workflow run release.yml -f tag="v${{ steps.version.outputs.version }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
